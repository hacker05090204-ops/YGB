[tool.pytest.ini_options]
testpaths = [
    "api",
    "python",
    "impl_v1",
    "HUMANOID_HUNTER"
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = [
    "api",
    "python",
    "impl_v1",
    "HUMANOID_HUNTER"
]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "**/test_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
fail_under = 100
show_missing = true
