name: Setup Python Environment
description: Set up Python with pip caching and install project dependencies
inputs:
  python-version:
    description: Python version to install
    required: false
    default: '3.11'
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          api/requirements.txt
          backend/requirements.txt

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install numpy pytest pytest-cov pytest-asyncio coverage gcovr
        pip install pycryptodome bcrypt
        pip install fastapi uvicorn pydantic httpx psutil aiosqlite PyJWT python-dotenv websockets
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
