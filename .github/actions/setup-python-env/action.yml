name: Setup Python Environment
description: Set up Python with pip caching and install project dependencies
inputs:
  python-version:
    description: Python version to install
    required: false
    default: '3.11'
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          api/requirements.txt
          backend/requirements.txt

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install numpy pytest pytest-cov pytest-asyncio coverage gcovr
        pip install pycryptodome bcrypt
        pip install fastapi uvicorn pydantic httpx psutil aiosqlite PyJWT python-dotenv websockets safetensors
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Prepare CI HMAC key
      shell: bash
      run: |
        python - <<'PYEOF'
        import hashlib
        import os
        from pathlib import Path

        raw_secret = (os.environ.get("YGB_HMAC_SECRET") or "").strip() or "ygb-ci-test-secret"
        try:
            bytes.fromhex(raw_secret)
            normalized = raw_secret.lower()
        except ValueError:
            normalized = hashlib.sha256(raw_secret.encode("utf-8")).hexdigest()

        Path("config").mkdir(parents=True, exist_ok=True)
        Path("config/hmac_secret.key").write_text(normalized + "\n", encoding="utf-8")
        print(f"::add-mask::{normalized}")

        github_env = os.environ.get("GITHUB_ENV")
        if github_env:
            with open(github_env, "a", encoding="utf-8") as handle:
                handle.write(f"YGB_HMAC_SECRET={normalized}\n")
        PYEOF
