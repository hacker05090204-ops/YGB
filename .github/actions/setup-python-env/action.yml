name: Setup Python Environment
description: Set up Python with pip caching and install project dependencies
inputs:
  python-version:
    description: Python version to install
    required: false
    default: '3.11'
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          pyproject.toml
          api/requirements.txt

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install numpy pytest pytest-cov pytest-asyncio coverage gcovr
        pip install pycryptodome bcrypt
        pip install fastapi uvicorn pydantic httpx psutil aiosqlite PyJWT python-dotenv websockets safetensors
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Prepare CI HMAC key
      shell: bash
      run: |
        python - <<'PYEOF'
        import hashlib
        import os
        from pathlib import Path

        raw_secret = (os.environ.get("YGB_HMAC_SECRET") or "").strip() or "ygb-ci-test-secret"
        try:
            bytes.fromhex(raw_secret)
            normalized = raw_secret.lower()
        except ValueError:
            normalized = hashlib.sha256(raw_secret.encode("utf-8")).hexdigest()

        Path("config").mkdir(parents=True, exist_ok=True)
        Path("config/hmac_secret.key").write_text(normalized + "\n", encoding="utf-8")
        print(f"::add-mask::{normalized}")

        github_env = os.environ.get("GITHUB_ENV")
        if github_env:
            with open(github_env, "a", encoding="utf-8") as handle:
                handle.write(f"YGB_HMAC_SECRET={normalized}\n")
        PYEOF

    - name: Prepare CI auth secrets
      shell: bash
      run: |
        python - <<'PYEOF'
        import hashlib
        import os

        def normalize(name: str, fallback: str) -> str:
            raw = (os.environ.get(name) or "").strip() or fallback
            try:
                bytes.fromhex(raw)
                value = raw.lower()
            except ValueError:
                value = hashlib.sha256(raw.encode("utf-8")).hexdigest()
            print(f"::add-mask::{value}")
            return value

        jwt_secret = normalize("JWT_SECRET", "ygb-ci-jwt-secret")
        video_secret = normalize("YGB_VIDEO_JWT_SECRET", "ygb-ci-video-secret")

        github_env = os.environ.get("GITHUB_ENV")
        if github_env:
            with open(github_env, "a", encoding="utf-8") as handle:
                handle.write(f"JWT_SECRET={jwt_secret}\n")
                handle.write(f"YGB_VIDEO_JWT_SECRET={video_secret}\n")
                handle.write("YGB_TEMP_AUTH_BYPASS=false\n")
        PYEOF

    - name: Prepare CI workspace
      shell: bash
      run: |
        python - <<'PYEOF'
        import json
        import os
        from pathlib import Path

        root = Path.cwd()
        frontend_package = root / "frontend" / "package.json"
        frontend_lockfile = root / "frontend" / "package-lock.json"
        native_cpp_entry = root / "native" / "run_cpp_tests.cpp"
        native_cpp_build = root / "scripts" / "build_cpp_tests.sh"

        flags = {
            "YGB_HAS_FRONTEND": str(frontend_package.exists()).lower(),
            "YGB_HAS_FRONTEND_LOCKFILE": str(frontend_lockfile.exists()).lower(),
            "YGB_HAS_NATIVE_CPP": str(
                native_cpp_entry.exists() and native_cpp_build.exists()
            ).lower(),
        }

        (root / "reports").mkdir(exist_ok=True)
        (root / "test-results").mkdir(exist_ok=True)

        report = {
            "frontend_package": str(frontend_package.relative_to(root)),
            "frontend_lockfile": str(frontend_lockfile.relative_to(root)),
            "native_cpp_entry": str(native_cpp_entry.relative_to(root)),
            "native_cpp_build_script": str(native_cpp_build.relative_to(root)),
            "flags": flags,
            "auth": {
                "jwt_secret_present": bool(os.environ.get("JWT_SECRET")),
                "video_jwt_secret_present": bool(os.environ.get("YGB_VIDEO_JWT_SECRET")),
                "temporary_bypass": os.environ.get("YGB_TEMP_AUTH_BYPASS", "false"),
            },
        }
        (root / "reports" / "ci_bootstrap.json").write_text(
            json.dumps(report, indent=2) + "\n",
            encoding="utf-8",
        )

        github_env = os.environ.get("GITHUB_ENV")
        if github_env:
            with open(github_env, "a", encoding="utf-8") as handle:
                for key, value in flags.items():
                    handle.write(f"{key}={value}\n")
        PYEOF
