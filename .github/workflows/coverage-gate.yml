name: Coverage Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: coverage-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONNOUSERSITE: "1"
  YGB_HMAC_SECRET: ${{ secrets.YGB_HMAC_SECRET }}
  YGB_ENV: test
  YGB_TEMP_AUTH_BYPASS: "false"
  YGB_HAS_FRONTEND: "false"
  YGB_HAS_NATIVE_CPP: "false"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show commit
        run: git log -1 --oneline

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Set up Node.js
        if: ${{ env.YGB_HAS_FRONTEND == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify native toolchain
        if: ${{ env.YGB_HAS_NATIVE_CPP == 'true' }}
        run: |
          command -v g++ >/dev/null 2>&1 || { echo "FATAL: g++ not available on runner"; exit 1; }
          command -v gcovr >/dev/null 2>&1 || { echo "FATAL: gcovr not available in Python environment"; exit 1; }
          g++ --version
          gcovr --version

      - name: Verify Python environment
        run: |
          python -c "import numpy; print('numpy', numpy.__version__)"
          grep "_validate_structure" backend/api/runtime_api.py

      - name: Validate environment
        run: |
          echo "::add-mask::$YGB_HMAC_SECRET"
          pwd
          echo "PYTHONPATH: $PYTHONPATH"
          test -n "$YGB_HMAC_SECRET" || { echo "FATAL: YGB_HMAC_SECRET not configured"; exit 1; }
          test -f config/hmac_secret.key || { echo "FATAL: config/hmac_secret.key missing"; exit 1; }
          test -f reports/ci_bootstrap.json || { echo "FATAL: reports/ci_bootstrap.json missing"; exit 1; }
          test -d backend || { echo "FATAL: backend/ not found"; exit 1; }
          test -f backend/__init__.py || { echo "FATAL: backend/__init__.py missing"; exit 1; }
          test -f backend/tests/__init__.py || { echo "FATAL: backend/tests/__init__.py missing"; exit 1; }
          ls -la backend/tests/test_*.py

      - name: Runtime safety tests
        run: pytest backend/tests/test_runtime_safety.py -v -s --tb=long

      - name: Backend tests with JUnit and coverage
        run: |
          set -o pipefail
          mkdir -p test-results
          pytest backend/tests/ -v -s --tb=long \
            --junitxml=test-results/junit.xml \
            --cov=backend \
            --cov-config=.coveragerc-ci \
            --cov-fail-under=0 \
            --cov-report=json:coverage_python.json \
            --cov-report=xml:coverage_python.xml \
            --cov-report=term \
            2>&1 | tee test-results/test-output.txt
          test -f coverage_python.json

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: test-results/
          if-no-files-found: warn

      - name: Check backend test results
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os
          import sys
          import xml.etree.ElementTree as ET

          junit_path = "test-results/junit.xml"
          txt_path = "test-results/test-output.txt"

          if not os.path.exists(junit_path):
              print("::error::JUnit XML not found — tests may not have run")
              if os.path.exists(txt_path):
                  with open(txt_path, encoding="utf-8", errors="replace") as f:
                      for line in f.readlines()[-50:]:
                          print(line, end="")
              sys.exit(1)

          tree = ET.parse(junit_path)
          root = tree.getroot()
          suites = [root] if root.tag == "testsuite" else list(root.iter("testsuite"))
          tests = sum(int(s.attrib.get("tests", 0)) for s in suites)
          failures = sum(int(s.attrib.get("failures", 0)) for s in suites)
          errors = sum(int(s.attrib.get("errors", 0)) for s in suites)
          skipped = sum(int(s.attrib.get("skipped", 0)) for s in suites)

          print(f"Tests: {tests}, Failures: {failures}, Errors: {errors}, Skipped: {skipped}")

          for suite in suites:
              for tc in suite.iter("testcase"):
                  fail = tc.find("failure")
                  err = tc.find("error")
                  if fail is not None:
                      name = tc.attrib.get("name", "?")
                      cls = tc.attrib.get("classname", "?")
                      msg = fail.attrib.get("message", fail.text or "(no message)")
                      print(f"::error::FAILED: {cls}::{name} — {msg[:200]}")
                  elif err is not None:
                      name = tc.attrib.get("name", "?")
                      cls = tc.attrib.get("classname", "?")
                      msg = err.attrib.get("message", err.text or "(no message)")
                      print(f"::error::ERROR: {cls}::{name} — {msg[:200]}")

          if failures or errors:
              if os.path.exists(txt_path):
                  print("\n=== LAST 50 LINES OF OUTPUT ===")
                  with open(txt_path, encoding="utf-8", errors="replace") as f:
                      for line in f.readlines()[-50:]:
                          print(line, end="")
              sys.exit(1)
          PYEOF

      - name: C++ coverage
        if: ${{ env.YGB_HAS_NATIVE_CPP == 'true' }}
        run: |
          chmod +x scripts/build_cpp_tests.sh
          bash scripts/build_cpp_tests.sh
          test -f coverage_cpp.json

      - name: JS/TS coverage
        if: ${{ env.YGB_HAS_FRONTEND == 'true' }}
        run: |
          cd frontend
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
          npm test
          test -f coverage/coverage-summary.json

      - name: Run coverage gate
        env:
          COVERAGE_GATE_MODE: advisory
        run: python scripts/coverage_gate.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage_python.json
            coverage_python.xml
            coverage_cpp.json
            frontend/coverage/
            reports/ci_bootstrap.json
            reports/coverage_report.json
          if-no-files-found: warn

  security-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Run security regression scanner
        run: python scripts/security_regression_scan.py

      - name: Run security regression tests
        run: pytest backend/tests/test_security_regression_guards.py -v --tb=short

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-regression-report
          path: reports/security_regression_report.json
          if-no-files-found: warn

  reliability-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GATE_READINESS_LATENCY_MS: "5000"
      GATE_TIMEOUT_RATE: "0.05"
      GATE_COMPLETENESS: "0.95"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Run reliability tests
        run: pytest backend/tests/test_reliability.py backend/tests/test_observability.py backend/tests/test_api_v2_contract.py backend/tests/test_wiring_audit.py -v --tb=short

      - name: Run reliability gate
        run: python scripts/reliability_gate.py

      - name: Upload reliability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reliability-gate-report
          path: reports/reliability_gate_report.json
          if-no-files-found: warn

  training-inference-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Training pipeline import validation
        run: |
          python -c "
          from backend.training.state_manager import get_training_state_manager
          mgr = get_training_state_manager()
          progress = mgr.get_training_progress()
          assert progress.status in ('idle', 'running', 'error', 'completed'), f'Bad status: {progress.status}'
          print(f'Training state OK: {progress.status}')
          "

      - name: Safetensors I/O validation
        run: |
          python - <<'PYEOF'
          import os
          import tempfile

          import numpy as np

          from training.safetensors_io import load_safetensors, save_safetensors

          data = {"weights": np.random.randn(4, 4).astype(np.float32)}
          with tempfile.NamedTemporaryFile(suffix=".safetensors", delete=False) as handle:
              path = handle.name

          try:
              save_safetensors(data, path)
              loaded = load_safetensors(path)
              assert "weights" in loaded, "Missing weights after roundtrip"
              assert loaded["weights"].shape == (4, 4), (
                  f"Wrong shape: {loaded['weights'].shape}"
              )
              print("Safetensors roundtrip OK")
          finally:
              os.unlink(path)
          PYEOF

      - name: Run training and system status tests
        run: |
          pytest backend/tests/test_system_status.py -v --tb=short
          pytest backend/tests/test_e2e_audit.py::TestTrainingStateManagerNoMocks -v --tb=short
